<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>歐洲輪盤間隔預測工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="content">
      <section class="card">
        <div class="section-head compact-head">
          <div>
            <h2>1. 輸入歷史號碼</h2>
            <p>只保留批量輸入。請由前期到近期依序貼上。</p>
          </div>
        </div>

        <div class="input-stack">
          <label class="field-label" for="bulkInput">批量輸入</label>
          <textarea id="bulkInput" rows="5" placeholder="例如：5, 9, 22, 1, 0, 32"></textarea>
          <div class="action-row wrap">
            <button id="replaceBulkBtn" class="secondary-btn">覆蓋歷史資料</button>
            <button id="appendBulkBtn" class="ghost-btn">追加歷史資料</button>
            <button id="sampleBtn" class="ghost-btn">載入範例</button>
            <button id="clearAllBtn" class="ghost-btn danger-outline">清空全部</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-head compact-head">
          <div>
            <h2>2. 輸入最新一期號碼</h2>
            <p>輸入後會自動加入歷史序列，並重新分析。</p>
          </div>
        </div>

        <div class="inline-row latest-row">
          <input id="latestInput" type="number" inputmode="numeric" min="0" max="36" placeholder="0 ~ 36" />
          <button id="addLatestBtn" class="primary-btn">加入最新一期</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <h2>3. 歷史序列</h2>
            <p>最新一期排在最前面，最後一期排在最後面。</p>
          </div>
          <div class="stats-inline">
            <span class="pill"><strong id="historyCount">0</strong> 筆</span>
            <span class="pill">最新：<strong id="latestNumber">-</strong></span>
          </div>
        </div>
        <div id="historyList" class="history-grid empty-state">尚未輸入任何號碼。</div>
      </section>

      <section class="card highlight-card">
        <div class="section-head">
          <div>
            <h2>4. 下一期預測結果</h2>
            <p>依歷史順向 / 逆向間隔推算。</p>
          </div>
          <button id="analyzeBtn" class="primary-btn">重新分析</button>
        </div>

        <div class="results-grid">
          <div class="subcard">
            <h3>可能會開的號碼</h3>
            <p class="subcard-text">依重覆次數由多至少排序；次數相同時依號碼小到大。</p>
            <div id="possibleNumbers" class="result-list empty-state">尚無預測結果。</div>
          </div>

          <div class="subcard">
            <h3>預測不會開的號碼</h3>
            <p class="subcard-text">從 0~36 扣除所有候選號碼後，小到大排列。</p>
            <div id="impossibleNumbers" class="result-list empty-state">尚無預測結果。</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
